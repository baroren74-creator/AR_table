<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mc Table Games</title>

<style>
body {margin:0;font-family:Arial;background:#ffbc0d}
.screen {position:fixed;inset:0;display:flex;justify-content:center;align-items:center;background:#db0007;color:white}
.hidden {display:none}
.btn {padding:14px 20px;margin:6px;border:none;border-radius:20px;font-weight:bold}
.game {position:fixed;inset:0}
.item {position:absolute;width:70px;height:70px}
</style>
</head>

<body>

<div id="start" class="screen">
  <div>
    <h2>Mc Games</h2>
    <button class="btn" onclick="createRoom()">פתח חדר</button>
  </div>
</div>

<div id="lobby" class="screen hidden">
  <div>
    <h3>בחר משחק</h3>
    <button class="btn" onclick="selectGame('catch')">🍟 תפוס</button>
    <button class="btn" onclick="selectGame('bomb')">💣 פצצה</button>
    <button class="btn" onclick="selectGame('reaction')">⚡ מי ראשון</button>
  </div>
</div>

<div id="game" class="game hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
 apiKey: "AIzaSyB9sgQBeHOxc9U3syWWtAiipoGQB8dE7Xg",
 authDomain: "table-game-web.firebaseapp.com",
 databaseURL: "https://table-game-web-default-rtdb.firebaseio.com",
 projectId: "table-game-web"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomId = "room1";
let player = "p1";
let gameRunning = false;

function show(id){
  document.querySelectorAll(".screen,.game").forEach(e=>e.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

window.createRoom = async () => {
  await set(ref(db,"room"),{
    status:"lobby",
    game:null,
    score:{p1:0,p2:0}
  });
  show("lobby");
  subscribe();
};

window.selectGame = async (type) => {
  await update(ref(db,"room"),{
    status:"playing",
    game:type,
    score:{p1:0,p2:0}
  });
};

function subscribe(){
  onValue(ref(db,"room"),snap=>{
    const state = snap.val();
    if(!state) return;

    if(state.status==="lobby"){
      show("lobby");
    }

    if(state.status==="playing"){
      startGame(state.game);
    }
  });
}

function spawn(type){
  if(!gameRunning) return;

  const el = document.createElement("img");
  el.className="item";

  if(type==="catch") el.src="chips.png";
  if(type==="bomb") el.src=Math.random()>0.2?"chips.png":"burger.png";
  if(type==="reaction") el.src="ice cream.png";

  el.style.left=Math.random()*80+"%";
  el.style.top=Math.random()*80+"%";

  el.onclick=()=>{
    if(type==="bomb" && el.src.includes("burger")){
      update(ref(db,"room/score"),{p1:-1});
    } else {
      update(ref(db,"room/score"),{p1:1});
    }
    el.remove();
  };

  document.getElementById("game").appendChild(el);

  setTimeout(()=>el.remove(),1200);

  setTimeout(()=>spawn(type),200);
}

function startGame(type){
  show("game");
  document.getElementById("game").innerHTML="";
  gameRunning=true;

  if(type==="reaction"){
    setTimeout(()=>{
      const el=document.createElement("img");
      el.src="chips.png";
      el.className="item";
      el.style.left="40%";
      el.style.top="40%";
      el.onclick=()=>{
        alert("ניצחת!");
        gameRunning=false;
        show("lobby");
      };
      document.getElementById("game").appendChild(el);
    },2000);
  } else {
    spawn(type);
    setTimeout(()=>{
      gameRunning=false;
      show("lobby");
    },10000);
  }
}
</script>

</body>
</html>
